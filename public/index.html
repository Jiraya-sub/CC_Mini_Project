<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stocks Dashboard | DevOps Mini Project</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <nav>
        <a href="/" class="logo">StockPulse</a>
        <div class="nav-links">
            <a href="/">Dashboard</a>
            <a href="/about">About</a>
        </div>
    </nav>

    <main>
        <h1>Market Overview</h1>
        
        <div class="dashboard-grid">
            <!-- Stock Card 1 -->
            <div class="stock-card">
                <div class="stock-header">
                    <span class="stock-name">TCS</span>
                    <span class="stock-symbol">TCS</span>
                </div>
                <div class="stock-price">₹4,120.50</div>
                <div class="stock-change positive">+1.2% (Today)</div>
            </div>

            <!-- Stock Card 2 -->
            <div class="stock-card">
                <div class="stock-header">
                    <span class="stock-name">Infosys</span>
                    <span class="stock-symbol">INFY</span>
                </div>
                <div class="stock-price">₹1,650.00</div>
                <div class="stock-change negative">-0.5% (Today)</div>
            </div>

            <!-- Stock Card 3 -->
            <div class="stock-card">
                <div class="stock-header">
                    <span class="stock-name">Reliance</span>
                    <span class="stock-symbol">RELIANCE</span>
                </div>
                <div class="stock-price">₹2,980.20</div>
                <div class="stock-change positive">+2.1% (Today)</div>
            </div>

            <!-- Stock Card 4 -->
            <div class="stock-card">
                <div class="stock-header">
                    <span class="stock-name">HDFC Bank</span>
                    <span class="stock-symbol">HDFCBANK</span>
                </div>
                <div class="stock-price">₹1,540.00</div>
                <div class="stock-change positive">+0.8% (Today)</div>
            </div>

            <!-- Stock Card 5 -->
            <div class="stock-card">
                <div class="stock-header">
                    <span class="stock-name">Wipro</span>
                    <span class="stock-symbol">WIPRO</span>
                </div>
                <div class="stock-price">₹480.15</div>
                <div class="stock-change negative">-1.1% (Today)</div>
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 StockPulse DevOps Project. Built with Node.js & Docker.</p>
    </footer>
</body>
</html>
